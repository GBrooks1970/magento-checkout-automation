# CI overlay for docker-compose.yml.
#
# Usage (GitHub Actions — see .github/workflows/ci.yml):
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait
#
# This file overrides exactly two image references so CI pulls the pre-baked
# GHCR images instead of the plain upstream ones. Everything else — healthchecks,
# depends_on, volumes, env vars, the nginx bind-mount — is inherited from
# docker-compose.yml without change.
#
# How the seeding works
# ---------------------
# phpfpm: the pre-baked image has the full Magento 2.4.8 + Luma source at
#   /var/www/html (baked in by bake.yml). On first run Docker finds the
#   'appdata' named volume empty and copies the image's /var/www/html into
#   it (standard Docker volume-seeding behaviour). The 'app' (nginx) service
#   mounts the same 'appdata' volume, so it sees the same files.
#
# db: the pre-baked image has the Magento database dump at
#   /docker-entrypoint-initdb.d/magento-db.sql.gz. MariaDB's entrypoint
#   auto-restores it into the empty 'dbdata' volume on first start.
#   The restore completes before mysqladmin ping succeeds, so phpfpm's
#   service_healthy dependency on db is always satisfied with a live schema.
#
# Pre-baked images are built by .github/workflows/bake.yml (manual trigger).
# Rebuild when: Magento version changes, sample data changes, or any
# bin/magento config:set / module:disable step in the runbook changes.
#
# Tag policy (R-06b): this file is the single source of truth for WHICH bake
# CI tests. Every bake pushes a unique, never-overwritten tag
# (:2.4.8-b<run_number>) and prints the image digests in its run summary;
# adopting a new bake is a one-line-per-service PR here. ci.yml (preflight
# and the pull step) resolves the image references out of this file via
# `docker compose config --images`, so nothing else needs editing. The bare
# :2.4.8 tag is no longer published.
#
# Owner substitution (R-06c): the GHCR namespace owner is NOT hardcoded —
# ${GHCR_OWNER} is interpolated by compose so a fork pulls (and bakes to) its
# own namespace without editing this file. It must be the LOWERCASE GitHub
# owner (GHCR requires lowercase; the GitHub login may not be). CI derives it
# from github.repository_owner; locally either prefix the command
# (GHCR_OWNER=gbrooks1970 docker compose ...) or put GHCR_OWNER=gbrooks1970
# in a .env file next to this compose file (gitignored; compose auto-loads it).

services:
  phpfpm:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER to the lowercase GitHub owner whose GHCR namespace holds the baked images — see the header of docker-compose.ci.yml}/magento-checkout-automation/magento-store-app:2.4.8-b24

  db:
    image: ghcr.io/${GHCR_OWNER:?set GHCR_OWNER to the lowercase GitHub owner whose GHCR namespace holds the baked images — see the header of docker-compose.ci.yml}/magento-checkout-automation/magento-store-db:2.4.8-b24
