# End-to-end suite against a pre-baked Magento 2.4.8 store, with Serenity
# living documentation published to GitHub Pages on every green main push.
#
# PREREQUISITES (one-off, before this workflow can pass):
#   1. Run bake.yml (workflow_dispatch) to build and push the two GHCR images.
#      That workflow needs MAGENTO_PUBLIC_KEY / MAGENTO_PRIVATE_KEY secrets.
#      After bake.yml succeeds, ci.yml needs NO Magento secrets — it pulls
#      pre-baked images and uses the hard-coded test credentials (admin /
#      Password123!) that are already baked into the store image.
#   2. Enable GitHub Pages: Settings → Pages → Source → GitHub Actions.
#
# BOOTSTRAPPING GUARD (preflight job)
#   The 'test' and 'deploy-pages' jobs are gated on a preflight job that
#   checks whether the GHCR images exist. If they don't (i.e. bake.yml has
#   not been run yet), both downstream jobs are SKIPPED — the PR check shows
#   ⊘ rather than ❌, which correctly signals "not ready" rather than
#   "broken". Once bake.yml has run and the images are public, every
#   subsequent push goes through the full test path automatically.
#
# TIMING (ubuntu-latest, after bake.yml has run):
#   Pull GHCR images     ~3–5 min   (same Azure network as Actions runners)
#   docker compose up    ~4–6 min   (DB restore from dump + OpenSearch 60s boot)
#   npm ci + playwright  ~2–3 min
#   npm test             ~5–10 min  (7 smoke + 4 @placesOrder scenarios)
#   Serenity report      ~1 min
#   Total                ~15–25 min (vs ~40 min for a fresh install)

name: e2e

# Opt into Node.js 24 for all actions ahead of the June 16 2026 forced
# migration. Suppresses the deprecation warning that causes actions/checkout,
# actions/setup-node, and upload-pages-artifact to fail on runners close to
# the cutoff date.
#
# SERENITY_EXPECTED_SCENARIOS (MAG-C09): the number of scenario JSON
# documents the 'default' Cucumber profile must produce in docs/reports/
# (features/**/*.feature, tag 'not @deferred'). This is NOT the raw Gherkin
# scenario/example count (12: 9 Scenarios + the 3-row 'Order multiple
# quantities of a single product' Outline) — @serenity-js/serenity-bdd
# deliberately aggregates every example row of a Scenario Outline into a
# SINGLE JSON report (DomainEventQueues.queueIdFor() matches each row's
# SceneSequenceDetected event by its *Outline's* ScenarioDetails, which is
# identical across all rows, so they share one report queue regardless of
# row count). So: 9 single Scenarios + 1 aggregated Outline report = 10.
# Defined once here so the guard step below and any future consumer read the
# same value instead of a duplicated literal. Update this alongside any
# change to the feature set that adds/removes a Scenario or a Scenario
# Outline (adding/removing example rows within an existing Outline does NOT
# change this count).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERENITY_EXPECTED_SCENARIOS: 10

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Firefox/WebKit legs run schedule- and main-only (TRIAGE-03, review v2
  # Risk 3): weekly is enough to catch drift changing, without paying the
  # ~3x CI-minutes cost of a full store bring-up per engine on every PR push.
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC

jobs:
  # ── Preflight: check images exist ─────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    outputs:
      images-available: ${{ steps.check.outputs.available }}

    steps:
      - name: Check out
        # Needed only to read the compose files — docker-compose.ci.yml is the
        # single source of truth for WHICH baked image tag this pipeline tests
        # (R-06b). Each bake pushes a unique :2.4.8-b<run_number> tag; adopting
        # one is a PR that edits the overlay, and every reference here follows it.
        uses: actions/checkout@v4

      - name: Derive the GHCR namespace owner (R-06c)
        # GHCR requires a LOWERCASE namespace, but github.repository_owner
        # preserves the login's case (e.g. GBrooks1970) and Actions expressions
        # have no lowercase function — so derive it in shell, once per job.
        # docker-compose.ci.yml interpolates ${GHCR_OWNER}, which is what makes
        # a fork pull its own namespace without editing any file.
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "GHCR_OWNER=${OWNER,,}" >> "$GITHUB_ENV"

      - name: Check whether pre-baked GHCR images exist
        id: check
        # docker manifest inspect queries the registry without pulling the
        # image. It succeeds (exit 0) if the manifest exists and is public,
        # and fails (exit 1) if the image is absent or private.
        # BOTH images are checked individually. An earlier version checked
        # store-app as a proxy for both ("always built and pushed together"),
        # but the recorded empty-dump incident (backlog #4, bug 4) was exactly
        # a bake where store-app was good and store-db was a useless 4K image
        # — the proxy assumption does not hold.
        # `docker compose config --images` (not a raw grep of the overlay)
        # resolves the ${GHCR_OWNER} interpolation exactly as `compose up`
        # will, so what preflight checks is what the test job runs (R-06c).
        run: |
          mapfile -t images < <(docker compose -f docker-compose.yml -f docker-compose.ci.yml config --images | grep '^ghcr\.io/')
          if [ "${#images[@]}" -ne 2 ]; then
            echo "::error::Expected exactly 2 ghcr.io image references in" \
                 "docker-compose.ci.yml, found ${#images[@]} — the overlay and" \
                 "this parse step have drifted apart."
            exit 1
          fi
          available=true
          for ref in "${images[@]}"; do
            if docker manifest inspect "$ref" > /dev/null 2>&1; then
              echo "${ref}: manifest found."
            else
              available=false
              echo "::warning::Pre-baked image ${ref} not available." \
                   "Run bake.yml (Actions → bake-store-images → Run workflow)," \
                   "set both GHCR packages to public, then point" \
                   "docker-compose.ci.yml at the new :2.4.8-b<run_number> tag" \
                   "(printed in the bake run summary) before re-running."
            fi
          done
          echo "available=${available}" >> "$GITHUB_OUTPUT"

  # ── Compute the browser matrix ───────────────────────────────────────────
  # GitHub Actions does not allow the `matrix` context inside a job-level
  # `if:` (only `steps.*.if` can see it), so per-matrix-combination skipping
  # cannot be expressed directly on the `test` job below. Instead, compute
  # the matrix LIST itself here, before the job that consumes it (TRIAGE-03,
  # review v2 Risk 3): schedule runs and pushes to `main` get all three
  # engines; everything else (PRs) gets Chromium only. `test` reads this via
  # `fromJson(needs.compute-browsers.outputs.browsers)`.
  compute-browsers:
    needs: preflight
    if: needs.preflight.outputs.images-available == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    outputs:
      browsers: ${{ steps.set.outputs.browsers }}
    steps:
      - name: Decide which engines run this event
        id: set
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo 'browsers=["chromium","firefox","webkit"]' >> "$GITHUB_OUTPUT"
          else
            echo 'browsers=["chromium"]' >> "$GITHUB_OUTPUT"
          fi

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    needs: [preflight, compute-browsers]
    # Skip entirely if the images haven't been baked yet. A skipped job
    # produces a neutral (⊘) check status rather than a failure (❌).
    if: needs.preflight.outputs.images-available == 'true'

    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: read

    # Cross-browser run matrix (backlog #14 / planning proposal 0003). Each
    # engine gets its own full store bring-up + suite run (roughly triples CI
    # minutes on the schedule/main runs where all three execute — the
    # documented, accepted trade-off; see the compute-browsers job above for
    # why PRs only pay for one). Chromium is the REQUIRED gate: it runs with
    # continue-on-error unset (false), so a Chromium failure fails the
    # job/workflow as before. Firefox and WebKit are NON-BLOCKING matrix legs
    # (continue-on-error: true) — real engine-specific drift surfaces there
    # without gating merges until they've been triaged and are stable enough
    # to promote to required.
    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(needs.compute-browsers.outputs.browsers) }}
    continue-on-error: ${{ matrix.browser != 'chromium' }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Derive the GHCR namespace owner (R-06c)
        # Same derivation as preflight (jobs do not share GITHUB_ENV). Needed
        # by every step that touches the compose overlay: the pull below,
        # compose up, and the teardown.
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "GHCR_OWNER=${OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Pull pre-baked store images
        # Explicit pull so the layer-cache warm-up is a named step in the log.
        # The image references (including WHICH unique :2.4.8-b<run_number>
        # bake tag is in force) come from docker-compose.ci.yml — the single
        # source of truth, updated only by PR (R-06b) — resolved through
        # `docker compose config --images` so the ${GHCR_OWNER} interpolation
        # matches what `compose up` will use (R-06c).
        run: |
          mapfile -t images < <(docker compose -f docker-compose.yml -f docker-compose.ci.yml config --images | grep '^ghcr\.io/')
          for ref in "${images[@]}"; do
            docker pull "$ref"
          done

      - name: Start Magento store
        # Merges the CI overlay (pre-baked images) over the base compose.
        # --wait blocks until every healthcheck passes:
        #   db         — MariaDB restores the DB dump first (~2–3 min), then pings
        #   opensearch — start_period: 60s covers its ~50s cold boot
        #   app        — curl 127.0.0.1:8000 (nginx serving Magento)
        # appdata named volume is auto-seeded from the store-app image on
        # first start (Docker copies image content into the empty volume).
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            up -d --wait
        timeout-minutes: 15

      - name: Smoke-check storefront
        run: |
          curl -sf http://localhost:8080/ -o /dev/null
          echo "Storefront HTTP 200 OK"

      - name: Warm up the store
        # The pre-baked store boots with an empty Redis (full-page cache) and a
        # cold PHP OPcache, so the FIRST request to any page type pays a large
        # compile/render penalty (>15 s observed in CI). That penalty landed on
        # whichever scenario happened to run first, producing flaky add-to-cart /
        # cart-update timeouts that moved between scenarios run-to-run. Prime the
        # exact page types the suite touches (homepage, both product pages, the
        # cart) so the cost is paid here, outside any assertion. OPcache is shared
        # across all php-fpm workers, so two passes is enough to warm them.
        # Each curl must return 200: a non-200 here means the store is only
        # half-up (e.g. DB restored but Magento erroring), and proceeding would
        # fail later inside the suite with a far less specific signal. Fail the
        # step at the first bad code instead.
        run: |
          for pass in 1 2; do
            for url in \
              "http://localhost:8080/" \
              "http://localhost:8080/push-it-messenger-bag.html" \
              "http://localhost:8080/fusion-backpack.html" \
              "http://localhost:8080/checkout/cart"; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
              echo "pass $pass  HTTP $code  $url"
              if [ "$code" != "200" ]; then
                echo "::error::Warm-up request to $url returned HTTP $code — store is not fully up."
                exit 1
              fi
            done
          done

      - name: Run full test suite
        env:
          BASE_URL: http://localhost:8080
          # Admin credentials match what is baked into the store image.
          # MagentoApiClient uses these to mint a bearer token for the
          # API-driven Background step (backlog #3 / ADR-0003).
          MAGENTO_ADMIN_USERNAME: admin
          MAGENTO_ADMIN_PASSWORD: Password123!
          # Selects the Playwright engine in src/hooks/browser.hooks.ts
          # (backlog #14). Chromium is the required leg; firefox/webkit are
          # non-blocking (see the job-level continue-on-error above).
          BROWSER: ${{ matrix.browser }}
        run: npm test
        # 'default' profile already excludes @deferred (see cucumber.js);
        # @placesOrder scenarios ARE included — CI runs against a clean,
        # disposable store so placing real orders is fine.

      - name: Guard — Serenity JSON must evidence the expected scenario count (MAG-C09)
        # The published report was an empty shell from go-live (2026-06-08) to
        # 2026-06-11: Cucumber permits exactly ONE stdout formatter and silently
        # drops the rest, so a stray `progress-bar` entry displaced the
        # @serenity-js/cucumber adapter — no events, no JSON in docs/reports/,
        # and the renderer happily published a zero-scenario template while the
        # suite stayed green (PRs #18/#19). The original guard only checked
        # "at least one non-empty file", which would miss a narrower defect —
        # e.g. an accidental tag-expression change that silently drops
        # scenarios while still producing SOME non-empty JSON. Strengthened
        # (review Risk 5) to assert the exact expected scenario-document
        # count, sourced from the single SERENITY_EXPECTED_SCENARIOS env var
        # defined at the top of this workflow, so both defect classes —
        # zero JSON (starved formatter) and fewer-than-expected JSON (a
        # narrowing regression) — fail the run loudly instead of publishing
        # an incomplete report.
        #
        # `if: always()` + `id: serenity-guard` (review v2 Risk 2): without these,
        # a test-step failure BEFORE any JSON is written (e.g. MagentoApi.authenticate()
        # throwing in BeforeAll, or a recurrence of the starved-formatter defect
        # itself) skips this guard under GitHub Actions' default behaviour — while
        # the render/upload/deploy steps below still run under `always()`, so a
        # zero-JSON run would republish an EMPTY report over the live one. That is
        # a different failure mode to a *scenario* failing with complete JSON (the
        # documented, intentional publish-on-failure policy — see the render step's
        # comment): this guard's outcome is what tells the two apart. The render and
        # upload steps below gate on `steps.serenity-guard.outcome == 'success'` so
        # missing/partial JSON can never publish, while a failing-scenarios-but-
        # complete-JSON run still does.
        id: serenity-guard
        if: always()
        run: |
          shopt -s nullglob
          nonempty=0
          for f in docs/reports/*.json; do
            if [ -s "$f" ]; then
              nonempty=$((nonempty + 1))
            fi
          done
          if [ "$nonempty" -eq 0 ]; then
            echo "::error::docs/reports/ contains no non-empty Serenity JSON." \
                 "The @serenity-js/cucumber adapter has probably been displaced" \
                 "from Cucumber's single stdout-formatter slot (the starved-" \
                 "formatter lesson, PR #19) — check the 'format' array in" \
                 "cucumber.js: the adapter must be the only stdout formatter." \
                 "Rendering now would publish an empty-shell report."
            exit 1
          fi
          if [ "$nonempty" -ne "$SERENITY_EXPECTED_SCENARIOS" ]; then
            echo "::error::docs/reports/ contains ${nonempty} non-empty Serenity" \
                 "JSON file(s), expected exactly ${SERENITY_EXPECTED_SCENARIOS}" \
                 "(SERENITY_EXPECTED_SCENARIOS, set at the top of ci.yml)." \
                 "This usually means a tag expression or feature/scenario" \
                 "selection has narrowed (or widened) what actually ran —" \
                 "check the 'tags' field in cucumber.js's default profile" \
                 "against features/**/*.feature, or update" \
                 "SERENITY_EXPECTED_SCENARIOS if the scenario count changed" \
                 "deliberately."
            exit 1
          fi
          echo "Guard OK: ${nonempty} non-empty Serenity JSON file(s) in docs/reports/, matching the expected ${SERENITY_EXPECTED_SCENARIOS}."

      - name: Generate Serenity living documentation
        # Run even when tests fail so reviewers can inspect the failing run —
        # but only when the guard above confirms complete JSON exists (review v2
        # Risk 2). A scenario failure with a full set of JSON reports still
        # renders (the documented publish-on-failure policy); a run that never
        # produced the expected JSON does not reach this step at all, so it can
        # never render (and later publish) an empty or partial shell.
        # Java 11+ is pre-installed on ubuntu-latest; the serenity-bdd CLI
        # uses it to render the HTML report from the JSON in docs/reports/.
        if: always() && steps.serenity-guard.outcome == 'success'
        run: npm run test:report

      - name: Upload Pages artifact
        # Restricted to the chromium leg (backlog #14): a GitHub Pages
        # deployment publishes exactly ONE artifact per workflow run, and
        # Chromium is the canonical/required engine — Firefox and WebKit are
        # exploratory, non-blocking legs whose reports are not published.
        # Also gated on the guard's outcome (review v2 Risk 2), matching the
        # render step above — no point uploading an artifact that was never
        # rendered.
        if: always() && steps.serenity-guard.outcome == 'success' && matrix.browser == 'chromium'
        uses: actions/upload-pages-artifact@v3
        with:
          # serenity-bdd run writes HTML to target/site/serenity/ by default.
          # docs/reports/ holds the JSON source data (ArtifactArchiver path
          # in src/serenity.config.ts); the CLI reads from there and outputs
          # the self-contained HTML here.
          path: target/site/serenity

      - name: Tear down store
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            down -v

  # ── Deploy Pages ──────────────────────────────────────────────────────────
  deploy-pages:
    needs: [preflight, test]
    # Only deploy from main, only when images existed (test actually ran),
    # and even on test failure so a broken run produces a visible report.
    if: |
      github.ref == 'refs/heads/main' &&
      needs.preflight.outputs.images-available == 'true' &&
      always()
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Serenity report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
