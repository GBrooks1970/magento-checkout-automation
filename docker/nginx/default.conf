# Test-target nginx vhost — serve Magento over plain HTTP on 8000 (published as
# host :8080). The upstream markoshust/magento-nginx default.conf redirects
# 8000 -> HTTPS:8443 with a self-signed cert. For a headless E2E test target we
# serve HTTP directly so BASE_URL=http://localhost:8080 works without any
# self-signed-cert trust handling in Playwright. SSL is intentionally omitted.
#
# Mounted read-only over /etc/nginx/conf.d/default.conf via docker-compose.yml.
# The included /var/www/html/nginx.conf is Magento's stock nginx.conf.sample
# (copied to nginx.conf), whose `fastcgi_pass fastcgi_backend;` expects an
# upstream named exactly `fastcgi_backend`, defined below to point at the
# PHP-FPM unix socket shared via the `sockdata` volume.

upstream fastcgi_backend {
  server unix:/sock/phpfpm.sock;
}

server {
  listen 8000;
  listen [::]:8000;

  set $MAGE_ROOT /var/www/html;

  fastcgi_buffer_size 64k;
  fastcgi_buffers 8 128k;

  include /var/www/html/nginx.conf;
}
